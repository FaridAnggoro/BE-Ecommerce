openapi: 3.0.0
info:
  title: Order Processing with Express.js and MongoDB
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/v1/order:
    post:
      summary: Create a new order
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order data
        "401":
          description: Unauthorized

    get:
      summary: Get all orders
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized

  /api/v1/order/{id}:
    get:
      summary: Get order details by ID
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: objectid
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /api/v1/order/current/user:
    get:
      summary: Get my own orders
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of my orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized (Token tidak valid atau tidak ada)

components:
  schemas:
    Order:
      type: object
      required:
        - productId
        - quantity
        - email
        - first_name
        - last_name
        - phone
      properties:
        id:
          type: string
          format: objectid
        product:
          type: string
          format: objectid
          example: "69e772105b717e4ff03bc46b"
        quantity:
          type: integer
          example: 1
        email:
          type: string
          example: "farid30@mail.com"
        first_name:
          type: string
          example: "farid"
        last_name:
          type: string
          example: "farid30@mail.com"
        phone:
          type: string
          example: "088882030390"

    securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
