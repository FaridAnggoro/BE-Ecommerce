openapi: 3.0.0
info:
  title: Product Management with Express.js and MongoDB
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  /api/v1/product:
    post:
      summary: Create a New Product
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input provided
        "401":
          description: Unauthorized

    get:
      summary: Get all products
      tags:
        - Products
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /api/v1/product/{id}:
    get:
      summary: Get product by ID
      tags:
        - Products
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: objectid
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found

    put:
      summary: Update an existing product
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the product to update
          schema:
            type: string
            format: objectid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid input provided
        "404":
          description: Product not found
        "401":
          description: Unauthorized

    delete:
      summary: Delete a product by ID
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the product to delete
          schema:
            type: string
            format: objectid
      responses:
        "200":
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Product deleted successfully"
        "404":
          description: Product not found
        "401":
          description: Unauthorized

  /api/v1/product/file-upload:
    post:
      summary: Upload product image
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: The image file to upload
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "File uploaded successfully"
                  filePath:
                    type: string
                    example: "/uploads/product-123.jpg"
        "400":
          description: Invalid file format
        "401":
          description: Unauthorized

components:
  schemas:
    Product:
      type: object
      required:
        - product_name
        - price
        - description
        - image
        - category
        - stock
      properties:
        id:
          type: integer
          readOnly: true
        product_name:
          type: string
          example: "Jaket The North Face"
        price:
          type: number
          example: 1300000
        description:
          type: string
          example: "Lorem Ipsum"
        image:
          type: string
          example: "/uploads/image-1776759756359.png"
        category:
          type: string
          example: "Pakaian"
        stock:
          type: number
          default: 0
          example: "8"

    securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT
